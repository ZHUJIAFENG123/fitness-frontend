<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资讯详情 - FitNews</title>
    <style id="theme-vars">
/* ===== FitNews Brand Design System — 活力运动风 ===== */

:root {
  /* --- Brand Colors --- */
  --color-primary: #1B6B3A;
  --color-primary-light: #238B4D;
  --color-primary-dark: #145230;
  --color-primary-50: #E8F5EC;
  --color-primary-100: #C8E6D0;
  --color-primary-200: #A3D4B0;
  --color-primary-500: #1B6B3A;
  --color-primary-600: #145230;
  --color-primary-700: #0F3D24;

  /* --- Accent --- */
  --color-accent: #F97316;
  --color-accent-light: #FB923C;
  --color-accent-dark: #EA580C;
  --color-accent-50: #FFF7ED;
  --color-accent-100: #FFEDD5;

  /* --- Neutral Palette --- */
  --color-bg: #FAFAF8;
  --color-bg-warm: #F5F3EF;
  --color-bg-card: #FFFFFF;
  --color-surface: #F0EFEB;
  --color-border: #E5E3DD;
  --color-border-light: #EDEBE6;

  --color-text-primary: #1A1A1A;
  --color-text-secondary: #5A5A55;
  --color-text-tertiary: #8A8A82;
  --color-text-inverse: #FFFFFF;

  /* --- Typography --- */
  --font-display: 'DM Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-body: 'DM Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

  --text-xs: 0.75rem;
  --text-sm: 0.875rem;
  --text-base: 1rem;
  --text-lg: 1.125rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --text-3xl: 1.875rem;
  --text-4xl: 2.25rem;

  --leading-tight: 1.2;
  --leading-snug: 1.35;
  --leading-normal: 1.6;
  --leading-relaxed: 1.75;

  /* --- Spacing --- */
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.25rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;
  --space-16: 4rem;

  /* --- Border Radius --- */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* --- Shadows --- */
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.04);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.05);

  /* --- Layout --- */
  --container-max: 1200px;
  --navbar-height: 64px;
}

/* Dark mode overrides */
html.dark {
  --color-bg: #0F1110;
  --color-bg-warm: #161816;
  --color-bg-card: #1C1E1C;
  --color-surface: #242624;
  --color-border: #2E302E;
  --color-border-light: #252725;
  --color-text-primary: #F0F0EC;
  --color-text-secondary: #A0A098;
  --color-text-tertiary: #6A6A62;
  --color-primary-50: #0F2A18;
  --color-primary-100: #163D22;
  --color-accent-50: #2A1A08;
  --color-accent-100: #3D2510;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.2);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.25);
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-surface); color: var(--color-text-primary); }
  }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main>
<!-- ======================== NAVBAR ======================== -->
<nav id="main-navbar" class="sticky top-0 z-50 w-full border-b" style="background: rgba(255,255,255,0.90); backdrop-filter: blur(12px); border-color: var(--color-border-light);">
  <div class="mx-auto flex h-16 max-w-[1200px] items-center justify-between px-4 sm:px-6 lg:px-8">
    <a href="news-list.html" class="flex shrink-0 items-center gap-2">
      <i data-lucide="leaf" class="h-6 w-6" style="color: var(--color-primary);"></i>
      <span class="text-xl font-bold tracking-tight" style="font-family: var(--font-display); color: var(--color-primary);">FitNews</span>
    </a>
    <ul class="hidden items-center gap-1 md:flex">
      <li><a href="home.html" class="nav-link px-4 py-2 text-sm font-medium" style="color: var(--color-text-secondary);">首页</a></li>
      <li><a href="news-list.html" class="nav-link px-4 py-2 text-sm font-medium" style="color: var(--color-primary);">资讯</a></li>
      <li><a href="course-list.html" class="nav-link px-4 py-2 text-sm font-medium" style="color: var(--color-text-secondary);">课程</a></li>
    </ul>
    <div class="flex items-center gap-3">
      <a href="#" class="rounded-lg px-4 py-2 text-sm font-medium" style="color: var(--color-text-secondary); border: 1px solid var(--color-border);">登录</a>
      <a href="#" class="rounded-lg px-4 py-2 text-sm font-medium text-white" style="background: var(--color-primary);">注册</a>
    </div>
  </div>
</nav>

<!-- ======================== ARTICLE CONTENT ======================== -->
<article class="mx-auto max-w-[800px] px-4 py-8 sm:px-6 lg:px-8">
  <!-- 加载状态 -->
  <div id="loading-state">
    <div class="h-8 w-3/4 rounded animate-pulse mb-4" style="background: var(--color-surface);"></div>
    <div class="h-4 w-1/4 rounded animate-pulse mb-6" style="background: var(--color-surface);"></div>
    <div class="h-48 rounded-xl animate-pulse mb-6" style="background: var(--color-surface);"></div>
    <div class="space-y-3">
      <div class="h-4 w-full rounded animate-pulse" style="background: var(--color-surface);"></div>
      <div class="h-4 w-full rounded animate-pulse" style="background: var(--color-surface);"></div>
      <div class="h-4 w-2/3 rounded animate-pulse" style="background: var(--color-surface);"></div>
    </div>
  </div>

  <!-- 文章内容 -->
  <div id="article-content" class="hidden">
    <!-- 分类标签 -->
    <div class="mb-4">
      <span id="article-category" class="inline-flex items-center rounded-md px-3 py-1 text-xs font-medium" style="background: var(--color-primary); color: var(--color-text-inverse);"></span>
    </div>

    <!-- 标题 -->
    <h1 id="article-title" class="text-3xl font-bold leading-tight mb-4" style="font-family: var(--font-display); color: var(--color-text-primary);"></h1>

    <!-- 元信息 -->
    <div class="flex items-center gap-4 mb-6 text-sm" style="color: var(--color-text-tertiary);">
      <span class="flex items-center gap-1"><i data-lucide="user" class="h-4 w-4"></i><span id="article-author"></span></span>
      <span class="flex items-center gap-1"><i data-lucide="calendar" class="h-4 w-4"></i><span id="article-date"></span></span>
      <span class="flex items-center gap-1"><i data-lucide="eye" class="h-4 w-4"></i><span id="article-views"></span></span>
      <span class="flex items-center gap-1"><i data-lucide="message-circle" class="h-4 w-4"></i><span id="article-comments"></span></span>
    </div>

    <!-- 封面图 -->
    <div id="article-cover" class="mb-8 rounded-xl overflow-hidden" style="background: linear-gradient(135deg, var(--color-primary-50) 0%, var(--color-primary-100) 100%);">
      <div class="h-48 flex items-center justify-center">
        <i data-lucide="image" class="h-16 w-16 opacity-20" style="color: var(--color-primary);"></i>
      </div>
    </div>

    <!-- 摘要 -->
    <div id="article-summary" class="mb-6 p-4 rounded-lg" style="background: var(--color-primary-50); border-left: 3px solid var(--color-primary);">
      <p class="text-sm leading-relaxed" style="color: var(--color-text-secondary);"></p>
    </div>

    <!-- 正文 -->
    <div id="article-body" class="prose prose-lg max-w-none mb-8" style="color: var(--color-text-primary); line-height: 1.75;"></div>

    <!-- 标签 -->
    <div id="article-tags" class="flex flex-wrap gap-2 mb-8"></div>

    <!-- 分享按钮 -->
    <div class="flex items-center gap-3 mb-8">
      <span class="text-sm" style="color: var(--color-text-tertiary);">分享到：</span>
      <button class="flex h-8 w-8 items-center justify-center rounded-lg transition-colors" style="background: var(--color-surface);" onmouseover="this.style.background='var(--color-primary-50)'" onmouseout="this.style.background='var(--color-surface)'">
        <i data-lucide="link" class="h-4 w-4" style="color: var(--color-text-secondary);"></i>
      </button>
    </div>
  </div>

  <!-- 错误状态 -->
  <div id="error-state" class="hidden py-16 text-center">
    <i data-lucide="file-x" class="h-16 w-16 mx-auto opacity-30" style="color: var(--color-text-tertiary);"></i>
    <p class="mt-4 text-lg" style="color: var(--color-text-secondary);">资讯不存在或已被删除</p>
    <a href="news-list.html" class="mt-4 inline-flex items-center gap-2 rounded-lg px-4 py-2 text-sm font-medium" style="background: var(--color-primary); color: var(--color-text-inverse);">
      <i data-lucide="arrow-left" class="h-4 w-4"></i>返回资讯列表
    </a>
  </div>
</article>

<!-- ======================== RELATED NEWS ======================== -->
<section id="related-section" class="hidden mx-auto max-w-[1200px] px-4 py-8 sm:px-6 lg:px-8">
  <h2 class="text-xl font-semibold mb-6" style="font-family: var(--font-display); color: var(--color-text-primary);">相关资讯</h2>
  <div id="related-grid" class="grid grid-cols-1 gap-5 md:grid-cols-3"></div>
</section>

<!-- ======================== FOOTER ======================== -->
<footer style="background: var(--color-primary-dark);">
  <div class="mx-auto max-w-[1200px] px-4 pt-12 pb-6 sm:px-6 lg:px-8">
    <p class="text-xs text-center" style="color: var(--color-primary-200);">&copy; 2026 FitNews. All rights reserved.</p>
  </div>
</footer>
    </main>

    <script>
      // API 基础地址
      const API_BASE = 'http://localhost:5000/api/news';

      // 获取URL参数
      function getUrlParam(name) {
        const params = new URLSearchParams(window.location.search);
        return params.get(name);
      }

      // 格式化浏览数
      function formatViews(views) {
        if (views >= 1000) {
          return (views / 1000).toFixed(1) + 'k';
        }
        return views;
      }

      // 格式化日期
      function formatDate(dateStr) {
        if (!dateStr) return '';
        const date = new Date(dateStr);
        return date.toLocaleDateString('zh-CN');
      }

      // 创建相关资讯卡片
      function createRelatedCard(news) {
        const card = document.createElement('a');
        card.href = `news-detail.html?id=${news.id}`;
        card.className = 'group flex flex-col overflow-hidden rounded-xl transition-transform duration-200';
        card.style.cssText = 'background: var(--color-bg-card); border: 1px solid var(--color-border-light); box-shadow: var(--shadow-sm);';
        card.onmouseover = function() { this.style.transform='translateY(-4px)'; this.style.boxShadow='var(--shadow-lg)'; };
        card.onmouseout = function() { this.style.transform='translateY(0)'; this.style.boxShadow='var(--shadow-sm)'; };

        card.innerHTML = `
          <div class="h-32 overflow-hidden" style="background: linear-gradient(135deg, var(--color-primary-50) 0%, var(--color-primary-100) 100%);">
            <div class="h-full flex items-center justify-center">
              <i data-lucide="file-text" class="h-8 w-8 opacity-20" style="color: var(--color-primary);"></i>
            </div>
          </div>
          <div class="p-3">
            <h3 class="line-clamp-2 text-sm font-semibold" style="color: var(--color-text-primary);">${news.title}</h3>
            <p class="mt-2 text-xs" style="color: var(--color-text-tertiary);">${formatDate(news.publish_date)} · ${formatViews(news.views || 0)} 阅读</p>
          </div>
        `;

        return card;
      }

      // 加载文章详情
      async function loadArticle() {
        const id = getUrlParam('id');
        if (!id) {
          showError();
          return;
        }

        const loadingState = document.getElementById('loading-state');
        const articleContent = document.getElementById('article-content');
        const errorState = document.getElementById('error-state');

        try {
          const response = await fetch(`${API_BASE}/${id}`);
          if (!response.ok) {
            showError();
            return;
          }

          const news = await response.json();

          // 隐藏加载状态，显示内容
          loadingState.classList.add('hidden');
          articleContent.classList.remove('hidden');

          // 填充内容
          document.getElementById('article-category').textContent = news.category || '资讯';
          document.getElementById('article-title').textContent = news.title;
          document.getElementById('article-author').textContent = news.author || '未知';
          document.getElementById('article-date').textContent = formatDate(news.publish_date);
          document.getElementById('article-views').textContent = formatViews(news.views || 0) + ' 阅读';
          document.getElementById('article-comments').textContent = (news.comment_count || 0) + ' 评论';

          // 摘要
          const summaryEl = document.getElementById('article-summary').querySelector('p');
          if (news.summary) {
            summaryEl.textContent = news.summary;
          } else {
            document.getElementById('article-summary').style.display = 'none';
          }

          // 正文
          document.getElementById('article-body').innerHTML = news.content || '<p style="color: var(--color-text-tertiary);">暂无内容</p>';

          // 标签
          if (news.tags) {
            const tags = news.tags.split(',').filter(t => t.trim());
            const tagsContainer = document.getElementById('article-tags');
            tags.forEach(tag => {
              const tagEl = document.createElement('span');
              tagEl.className = 'inline-flex items-center rounded-md px-2 py-1 text-xs';
              tagEl.style.cssText = 'background: var(--color-surface); color: var(--color-text-secondary);';
              tagEl.textContent = tag;
              tagsContainer.appendChild(tagEl);
            });
          }

          // 相关资讯
          if (news.relatedNews && news.relatedNews.length > 0) {
            document.getElementById('related-section').classList.remove('hidden');
            const grid = document.getElementById('related-grid');
            news.relatedNews.forEach(item => {
              grid.appendChild(createRelatedCard(item));
            });
          }

          // 更新页面标题
          document.title = `${news.title} - FitNews`;

          lucide.createIcons();
        } catch (error) {
          console.error('加载文章失败:', error);
          showError();
        }
      }

      // 显示错误状态
      function showError() {
        document.getElementById('loading-state').classList.add('hidden');
        document.getElementById('error-state').classList.remove('hidden');
        lucide.createIcons();
      }

      // 页面加载时执行
      loadArticle();
    </script>
</body>
</html>
